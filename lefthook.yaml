pre-commit:
  commands:
    format:
      # Scope to staged sources only — stage_fixed re-stages prettier's edits
      # so the commit lands clean. Without it, prettier rewrites would surface
      # as a dirty diff immediately after the commit.
      # Cover both top-level files (src/foo.ts) and nested (src/sub/foo.ts).
      # lefthook's glob treats `**` as requiring >=1 directory segment, so
      # `src/**/*.ts` alone never matches top-level sources and silently skips.
      glob: "{src/*.ts,src/**/*.ts,tests/*.ts,tests/**/*.ts}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    lint:
      # Scoped to staged TS sources only — much faster than `eslint ./` and
      # naturally inert for commits that don't touch source files.
      glob: "{src/*.ts,src/**/*.ts,tests/*.ts,tests/**/*.ts}"
      run: npx eslint {staged_files}
    audit:
      run: just audit
    build:
      run: just build
    test:
      depends_on: build
      run: just test

pre-push:
  commands:
    pipeline:
      run: just pipeline
