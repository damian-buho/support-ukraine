from_latest_tag = false
ignore_merge_commits = true
ignore_fixup_commits = false
disable_changelog = true
disable_bump_commit = false
generate_mono_repository_global_tag = true
generate_mono_repository_package_tags = true
branch_whitelist = []
pre = "alpha.*"
skip_ci = "[skip ci]"
skip_untracked = false
pre_bump_hooks = [
  "yq -i -o=json '.version = \"{{version}}\"' package.json",
  "npm install --package-lock-only",
  "yq -i -o=yaml '.version = \"{{version}}\"' CITATION.cff",
]
post_bump_hooks = [
  "git tag {{version_tag}} {{version_tag}}^{} --force --sign --annotate --message='{{version}}'"
]
pre_package_bump_hooks = []
post_package_bump_hooks = []

[git_hooks]

[commit_types]

[changelog]
path = "CHANGELOG.md"
authors = []
